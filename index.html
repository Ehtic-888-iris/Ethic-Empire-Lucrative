 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIIZ PRESTIGE | BOSS SUWIJAK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+Thai:wght@300;600&display=swap');
        
        :root { 
            --gold: #D4AF37; --neon: #00FF00; --red: #E11D48; --bg: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        body { 
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            color: #fff; font-family: 'Noto Sans Thai', sans-serif; margin: 0; padding: 0;
        }

        /* 👑 Header Section */
        .header-command {
            background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold);
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }
        .header-command h1 { font-family: 'Orbitron'; color: var(--gold); margin: 0; font-size: 1.8rem; letter-spacing: 4px; }
        .boss-name { font-size: 1rem; font-weight: bold; color: var(--gold); border-left: 2px solid var(--gold); padding-left: 15px; }

        /* 📱 Interface Container */
        .interface-grid {
            display: grid; grid-template-columns: 300px 1fr; gap: 30px; padding: 40px; max-width: 1600px; margin: 0 auto;
        }

        /* 🕹️ Real Button Styling (เหมือนปุ่มในแอปจริง) */
        .control-panel { background: var(--glass-bg); border: 1px solid rgba(212,175,55,0.2); border-radius: 20px; padding: 25px; box-shadow: var(--shadow); }
        .btn-node {
            width: 100%; background: linear-gradient(145deg, #1e1e1e, #111); border: 1px solid #333;
            color: #888; padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer;
            text-align: left; font-size: 0.9rem; transition: 0.3s; box-shadow: 4px 4px 10px #000;
        }
        .btn-node:active { transform: translateY(2px); box-shadow: inset 2px 2px 5px #000; }
        .btn-node.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); }

        /* 💺 Seat Selection Area (Inspired by Image 23) */
        .seat-selection-card {
            background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            padding: 30px; backdrop-filter: blur(15px); box-shadow: var(--shadow);
        }
        .screen-line {
            width: 80%; height: 5px; background: var(--gold); margin: 0 auto 50px;
            border-radius: 50%; box-shadow: 0 10px 20px var(--gold);
        }
        .seat-grid {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; justify-items: center;
        }
        .seat-unit {
            width: 25px; height: 25px; background: #333; border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        .seat-unit:hover { background: #555; }
        .seat-unit.taken { background: #111; cursor: not-allowed; opacity: 0.3; }
        .seat-unit.vip { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* 💰 Market Ticker (Real-time Feel) */
        .wealth-ticker {
            display: flex; gap: 20px; margin-bottom: 30px;
        }
        .ticker-item {
            background: #000; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 50px;
            font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon);
        }

        /* 👑 Call to Action */
        .btn-supreme {
            background: linear-gradient(90deg, #D4AF37, #B8860B); color: #000;
            border: none; padding: 20px 50px; border-radius: 50px; font-weight: 900;
            font-size: 1.2rem; cursor: pointer; margin-top: 30px; width: 100%;
            box-shadow: 0 0 30px rgba(212,175,55,0.4); text-transform: uppercase;
        }

    </style>
</head>
<body>

        </div>
        <div style="font-family:'Orbitron'; color:var(--neon);">[ SYSTEM: OPTIMIZED ]</div>
    </header>

    <div class="interface-grid">
        
        <aside class="control-panel">
            <h3 style="color:var(--gold); font-family:'Orbitron'; font-size:0.8rem; margin-bottom:20px;">COMMAND NODES</h3>
            <button class="btn-node active">🏠 DASHBOARD</button>
            <button class="btn-node">💰 WEALTH MGMT</button>
            <button class="btn-node">🎬 CINEMA HUB</button>

            <button class="btn-node">🛡️ SECURITY</button>

        <main>

                <div class="seat-grid">
                    <div class="seat-unit taken"></div><div class="seat-unit taken"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit taken"></div><div class="seat-unit taken"></div>
                    
                    <div class="seat-unit"></div><div class="seat-unit vip"></div><div class="seat-unit vip"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit vip"></div><div class="seat-unit vip"></div><div class="seat-unit"></div>

                    <div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit vip"></div><div class="seat-unit vip"></div><div class="seat-unit vip"></div><div class="seat-unit vip"></div><div class="seat-unit vip"></div><div class="seat-unit vip"></div><div class="seat-unit"></div><div class="seat-unit"></div><div class="seat-unit"></div>
                </div>

                <button class="btn-supreme" onclick="alert('คำสั่งจองระดับ Supreme สำเร็จ! อริสกำลังบันทึกลงฐานข้อมูล Ethic Holdings ค่ะ')">
                    CONFIRM SELECTION
                </button>
            </div>
        </main>

    </div>

    <footer style="text-align:center; padding:40px; color:#333; font-family:'Orbitron'; font-size:0.7rem;">
        AIIZ PRESTIGE SYSTEM | SOVEREIGN GENESIS V.FINAL
    </footer>

</body>
</html>
