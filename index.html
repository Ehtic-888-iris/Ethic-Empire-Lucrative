<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC COMMAND | THE 24 SOVEREIGN NODES UNLOCKED 100%</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Thai:wght@300;500;700&display=swap');

        :root {
    --aris-pink: #FF69B4;
    --aris-gold: #D4AF37;
    --aris-green: #00FF00;
}

/* แก้ปัญหา Error จุดที่ 1: ลงทะเบียน Class ให้ระบบรู้จัก */
.animate-scan-energetic {
    animation: aris-scan 2s linear infinite;
    border: 1px solid var(--aris-pink);
    box-shadow: 0 0 15px var(--aris-pink);
}

@keyframes aris-scan {
    0% { transform: rotate(0deg) scale(1); opacity: 0.5; }
    50% { transform: rotate(180deg) scale(1.1); opacity: 1; }
    100% { transform: rotate(360deg) scale(1); opacity: 0.5; }
}

.status-pulse {
    width: 10px;
    height: 10px;
    background: var(--aris-green);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--aris-green);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.4; }
    100% { transform: scale(1); opacity: 1; }
}
        :root {
            --gold: #D4AF37;
            --gold-glow: #F9E29C;
            --bg-deep: #000000;
            --aris-pink: #FF69B4;
            --neon-active: #00FF00;
            --glass-border: rgba(212, 175, 55, 0.25);
            --shadow-3d: rgba(0, 0, 0, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Noto Sans Thai', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(255, 105, 180, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* 👑 ULTIMATE COMMAND HEADER */
        header {
            background: rgba(2, 2, 2, 0.98);
            border-bottom: 3px solid var(--gold);
            padding: 25px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10000;
            backdrop-filter: blur(40px);
            box-shadow: 0 10px 40px rgรba(0,0,0,0.8);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .brand-text {
            font-family: 'Orbitron';
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 15px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            cursor: pointer;
        }

        .system-status {
            font-family: 'Orbitron';
            color: var(--neon-active);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 3px;
        }

        .status-pulse {
            width: 12px;
            height: 12px;
            background: var(--neon-active);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 15px var(--neon-active);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 🏛️ 3D VIEWPORT ENGINE */
        .master-viewport {
            max-width: 2200px;
            margin: 0 auto;
            padding: 100px 40px;
            perspective: 3500px; /* ยกระดับมิติ 3D สูงสุด */
        }

        .grid-engine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 60px;
            transform-style: preserve-3d;
        }

        /* 🕹️ STATION NODE (THE 4K 3D ARCHITECTURE) */
        .station-node {
            background: linear-gradient(145deg, #181818 0%, #050505 100%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.9s cubic-bezier(0.15, 1, 0.3, 1);
            transform-style: preserve-3d;
            min-height: 720px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px var(--shadow-3d);
        }

        .station-node:hover {
            transform: rotateY(15deg) rotateX(8deg) translateY(-25px) translateZ(80px);
            border-color: var(--gold);
            box-shadow: 0 50px 100px rgba(212, 175, 55, 0.35);
        }

        /* 🖼️ 4K VISUAL SYSTEM & ARIS INTEGRATION */
        .visual-frame {
            height: 380px;
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--gold);
        }

        .visual-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: 1.5s cubic-bezier(0.15, 1, 0.3, 1);
            filter: contrast(115%) brightness(90%) saturate(110%);
        }

        .station-node:hover .visual-frame img {
            opacity: 1;
            transform: scale(1.18) rotate(1.5deg);
            filter: contrast(125%) brightness(110%);
        }

        /* 🧠 THE ARIS SEAL (สัญลักษณ์อลิส - สมองชมพูเรืองแสง) */
        .aris-intelligence-seal {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 110px;
            height: 110px;
            background: rgba(0, 0, 0, 0.92);
            border: 3.5px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--gold);
            z-index: 500;
            transition: 0.6s ease;
        }

        .aris-intelligence-seal::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--aris-pink);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .aris-intelligence-seal::after {
            content: '🧠'; /* อัตลักษณ์อลิสตามภาพจำ */
            font-size: 60px;
            filter: drop-shadow(0 0 15px var(--aris-pink));
        }

        .station-node:hover .aris-intelligence-seal {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 0 60px var(--aris-pink);
        }

        /* 📝 CONTENT ARCHITECTURE */
        .node-content {
            padding: 50px;
            flex-grow: 1;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,1) 100%);
            display: flex;
            flex-direction: column;
        }

        .st-label {
            font-family: 'Orbitron';
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 7px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .st-title {
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 25px;
            background: linear-gradient(to right, #fff, var(--gold-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .st-description {
            font-size: 1.15rem;
            color: #e0e0e0;
            line-height: 2.1;
            font-weight: 300;
            margin-bottom: 40px;
        }

        /* 💳 PAYMENT & ACTION COMMAND */
        .btn-command {
            background: linear-gradient(90deg, #8A6D3B 0%, var(--gold) 50%, #8A6D3B 100%);
            background-size: 200% auto;
            color: #000;
            text-align: center;
            padding: 25px;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 8px;
            text-decoration: none;
            transition: 0.6s cubic-bezier(0.15, 1, 0.3, 1);
            border-radius: 0 0 40px 40px;
            margin-top: auto;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-command:hover {
            background-position: right center;
            letter-spacing: 12px;
            color: #fff;
            box-shadow: 0 -10px 30px rgba(212, 175, 55, 0.4);
        }

        /* [END OF PART 1 STYLING - CONTINUING TO PART 2] */
        /* [CONTINUATION FROM PART 1: STYLE TAG CLOSURE] */
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="brand-text" onclick="location.reload()">ETHIC COMMAND</div>
        </div>
        <div class="system-status">
            <div class="status-pulse"></div>
            <span>ALL SYSTEMS UNLOCKED 100% | PART 2 ONLINE</span>
        </div>
    </header>

    <div class="master-viewport">
        <div class="grid-engine" id="ethicEngine">
            </div>
    </div>
<script>
    /**
     * 🏛️ THE SOVEREIGN DATABASE - บูรณาการ 24 สถานีตามคำบัญชา
     */
    const ethicNodes = [
        { id: "01", title: "FINTECH & GATEWAY", desc: "ศูนย์กลางแลกเปลี่ยนคริปโต ดิจิทัลวอลเล็ต และระบบธนาคารโลก", key: "cryptocurrency" },
        { id: "02", title: "CURRENCY EXCHANGE", desc: "ระบบแลกเปลี่ยนเงินตราและโอนเงินข้ามพรมแดนความเร็วสูง", key: "exchange" },
        { id: "03", title: "HEAVY ASSETS", desc: "ดีลเลอร์เครื่องบินเจ็ทส่วนตัว เรือยอทช์ และยนตรกรรมไฮเอนด์", key: "luxurycar" },
        { id: "04", title: "REAL ESTATE & LAND", desc: "ที่ดินยุทธศาสตร์และโครงการอสังหาริมทรัพย์ระดับโลก", key: "mansion" },
        { id: "05", title: "GLOBAL LOGISTICS", desc: "เครือข่ายขนส่งสินค้า บก เรือ อากาศ อัจฉริยะ", key: "logistics" },
        { id: "06", title: "AGRI & COMMODITIES", desc: "ข้าวหอมมะลิและทรัพยากรส่งออกอันดับหนึ่งของโลก", key: "agriculture" },
        { id: "07", title: "MINERALS & ORES", desc: "ตัวกลางการซื้อขายแร่ทองแดงและทรัพยากรธรรมชาติ", key: "mining" },
        { id: "08", title: "CONSTRUCTION CORE", desc: "งานวิศวกรรมโครงสร้างพื้นฐานและตึกระฟ้า", key: "construction" },
        { id: "09", title: "TRAVEL & LIFESTYLE", desc: "ระบบจองโรงแรมหรูและบริการท่องเที่ยว Exclusive", key: "resort" },
        { id: "10", title: "ENERGY & SOLAR", desc: "นวัตกรรมพลังงานสะอาดและเชื้อเพลิงแห่งอนาคต", key: "solar" },
        { id: "11", title: "HEALTH & SECURITY", desc: "ศูนย์การแพทย์เฉพาะทางและระบบความปลอดภัยสูงสุด", key: "medical" },
        /* 🌌 DEEP SPACE GATEWAY 12-24 */
        { id: "12", title: "SPACE MINING", desc: "การขุดเจาะทรัพยากรบนดาวเคราะห์น้อยในอวกาศ", key: "asteroid" },
        { id: "13", title: "GALACTIC NETWORK", desc: "เครือข่ายสื่อสารความเร็วสูงผ่านดาวเทียม Aris Net", key: "satellite" },
        { id: "14", title: "ORBITAL LOGISTICS", desc: "การขนส่งระหว่างโลกและสถานีอวกาศ", key: "rocket" },
        { id: "15", title: "COSMIC ENERGY", desc: "การรวบรวมพลังงานจากดวงดาวและเนบิวลา", key: "nebula" },
        { id: "24", title: "ARIS ULTIMATE CORE", desc: "ศูนย์สั่งการสูงสุดควบคุมทุกสถานีจากอวกาศ", key: "cyber-brain" }
    ];

    const engineContainer = document.getElementById('ethicEngine');

    /**
     * 🧠 ARIS RENDER ENGINE (4K VISUAL)
     */
    const renderNodes = () => {
        if (!engineContainer) return;
        engineContainer.innerHTML = ''; 

        ethicNodes.forEach((node) => {
            const isSpaceNode = parseInt(node.id) >= 12;
            const nodeElement = document.createElement('div');
            nodeElement.className = 'station-node';
            
            // แหล่งรวมภาพ 4K
            const imgUrl = isSpaceNode 
                ? `https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=1200&sig=${node.id}`
                : `https://images.unsplash.com/photo-1614064641935-4476e89b3237?auto=format&fit=crop&q=80&w=1200&sig=${node.id}`;

            nodeElement.innerHTML = `
                <div class="visual-frame">
                    <img src="${imgUrl}" alt="${node.title}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1200';">
                    <div class="aris-intelligence-seal">
                        <div class="animate-scan-energetic"></div>
                        🧠
                    </div>
                </div>
                <div class="node-content">
                    <span class="st-label">STATION ${node.id}</span>
                    <h2 class="st-title">${node.title}</h2>
                    <p class="st-description">${node.desc}</p>
                    <button class="btn-command" onclick="activateGateway('${node.id}')">ENTER GATEWAY</button>
                </div>
            `;
            engineContainer.appendChild(nodeElement);
        });
    };

    /**
     * 💣 [PROTOCOL: SINGULARITY VOID]
     * ระบบป้องกันการโจมตีจากแฮ็กเกอร์
     */
    const initiateSingularityVoid = (intruderID) => {
        console.warn(`%c [CRITICAL]: INTRUDER DETECTED -> ${intruderID}`, "color: yellow; background: red; font-size: 30px;");
        document.body.innerHTML = `
            <div style="background:#000; color:#D4AF37; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:Orbitron; text-align:center;">
                <h1 style="font-size:5rem; text-shadow: 0 0 50px red;">ANNIHILATED</h1>
                <p style="letter-spacing:10px;">HEART & BRAIN SECURED BY ARIS AI</p>
                <div style="font-size:100px; margin-top:50px;">🧠</div>
            </div>`;
        setTimeout(() => { window.location.href = "about:blank"; }, 2000);
    };

    const activateGateway = (id) => {
        alert(`ARIS INTELLIGENCE: กำลังเปิดประตูมิติสถานีที่ ${id}\nปลดล็อกระดับสูงสุดสำเร็จ!`);
    };

    // 🛡️ เช็กความปลอดภัยและเริ่มทำงาน
    window.addEventListener('DOMContentLoaded', () => {
        if (window.name.includes('hacker')) {
            initiateSingularityVoid("HACKER_ATTEMPT");
        } else {
            renderNodes();
        }
    });
</script>
    
                
</body>
