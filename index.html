<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHT - SUPREME COMMAND CENTER 24</title>
    <style>
        :root { --gold: #AD4F37; --cyan: #00f3ff; --bg: #020202; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; text-align: center; }
        .galaxy { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: -1; animation: rotateGalaxy 120s linear infinite; }
        @keyframes rotateGalaxy { from { transform: rotate(0deg) scale(1.1); } to { transform: rotate(360deg) scale(1.1); } }
        header { padding: 40px 20px; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .logo { font-size: 60px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px var(--gold); letter-spacing: 15px; }
        .manifesto { max-width: 1000px; margin: 30px auto; padding: 20px; border: 1px solid var(--gold); border-radius: 15px; background: rgba(173, 79, 55, 0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1400px; margin: 40px auto; padding: 20px; }
        .node { background: rgba(255,255,255,0.03); border: 1px solid var(--cyan); border-radius: 12px; height: 320px; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; }
        .node-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: sepia(1) saturate(1.5); transition: 0.4s; }
        .node:hover .node-img { opacity: 1; filter: none; transform: scale(1.1); }
        .node-info { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(to top, black, transparent); box-sizing: border-box; text-align: left; }
        .node strong { color: var(--gold); font-size: 1.1rem; }
        .node:hover { box-shadow: 0 0 30px var(--cyan); border-color: white; }
    </style>
</head>
<body>
    <div class="galaxy"></div>
    <header><div class="logo">EHT</div></header>
    <section class="manifesto">
        <h2 style="color:var(--gold);">EHT: กองทัพเชื่อมต่อมหาอำนาจไร้พรมแดน</h2>
        <p>"เปลี่ยนกระแสดิจิทัลเป็นพลังงานที่ใช้ได้จริง เชื่อมโยงทุกองค์กรทั่วโลกไว้ในมือคุณ"</p>
    </section>
    <div class="grid" id="grid"></div>
    <script>
        const stations = [
            { n: "R&D Lab / ศูนย์วิจัย", i: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=500" },
            { n: "EV Model / ยานยนต์", i: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=500" },
            { n: "Logistics / ขนส่งโลก", i: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=500" },
            { n: "Defense / ระบบป้องกัน", i: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500" },
            { n: "Global Hospital / การแพทย์", i: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=500" },
            { n: "Vessels / เรือพาณิชย์", i: "https://images.unsplash.com/photo-1544848355-946772719602?w=500" },
            { n: "Global Cinema / โรงหนัง", i: "1000052731.jpg" }, // รูปที่บอสส่งมา
            { n: "Unified Bank / ธนาคาร", i: "https://images.unsplash.com/photo-1501167786227-4cba60f6d58f?w=500" },
            { n: "Marketplace / ตลาดโลก", i: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=500" },
            { n: "Payment Gateway", i: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=500" },
            { n: "Estate / อสังหาฯ", i: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=500" },
            { n: "Gold Reserve / คลังทอง", i: "https://images.unsplash.com/photo-1610375461246-83df859d849d?w=500" },
            { n: "Mining / เหมืองแร่ดิจิทัล", i: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=500" },
            { n: "AI Network / โครงข่าย AI", i: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=500" },
            { n: "Smart City / เมืองใหม่", i: "https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=500" },
            { n: "Energy / พลังงานโลก", i: "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=500" },
            { n: "Space Tech / อวกาศ", i: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=500" },
            { n: "Cyber Security / ไซเบอร์", i: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=500" },
            { n: "Food / นวัตกรรมอาหาร", i: "https://images.unsplash.com/photo-1466632348570-84803b1ad574?w=500" },
            { n: "Water / ระบบน้ำโลก", i: "https://images.unsplash.com/photo-1518063311540-06891997a3cd?w=500" },
            { n: "Charity / มูลนิธิ", i: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=500" },
            { n: "Education / การศึกษา", i: "https://images.unsplash.com/photo-1509062522246-3755977927d7?w=500" },
            { n: "Comm / การสื่อสารโลก", i: "https://images.unsplash.com/photo-1516387933931-133d132d73d5?w=500" },
            { n: "MAHA AMNAT / มหาอำนาจ", i: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500" }
        ];
        const g = document.getElementById('grid');
        stations.forEach((s, idx) => {
            let div = document.createElement('div');
            div.className = 'node';
            div.innerHTML = `<img src="${s.i}" class="node-img"><div class="node-info"><strong>STATION ${String(idx+1).padStart(2,'0')}</strong><br>${s.n}</div>`;
            g.appendChild(div);
        });
    </script>
</body>
</html>
