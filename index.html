<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC COMMAND | THE 24 SOVEREIGN GATEWAYS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Thai:wght@300;500;700&display=swap');
        
        :root {
            --gold: #D4AF37;
            --gold-bright: #F9E29C;
            --bg: #000;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Noto Sans Thai', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        /* 👑 COMMAND HEADER */
        .command-header {
            border-bottom: 3px solid var(--gold);
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .brand-title {
            font-family: 'Orbitron';
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(212,175,55,0.6);
        }

        /* 🏛️ 3D GATEWAY GRID */
        .gateway-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 35px;
            padding: 60px;
            perspective: 2000px;
        }

        /* 🕹️ SOVEREIGN 3D STATION (Master Layout) */
        .station-node {
            background: linear-gradient(145deg, #111, #000);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            transform-style: preserve-3d;
            min-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .station-node:hover {
            transform: rotateY(10deg) translateY(-20px);
            border-color: var(--gold);
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
        }

        /* 🖼️ 4K IMAGE CONTAINER (Bringing Boss's Key Visuals) */
        .image-4k-frame {
            height: 280px;
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--gold);
        }

        .main-visual {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transition: 0.8s;
        }

        .station-node:hover .main-visual {
            opacity: 1;
            transform: scale(1.15);
        }

        /* 🧠 ARIS AI SOVEREIGN LOGO */
        .aris-stamp-4k {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border: 3px solid var(--gold);
            border-radius: 50%;
            background: #000;
            box-shadow: 0 0 25px var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .aris-stamp-4k::before {
            content: '🧠'; /* อริสจัดให้เป็นไอคอนสมองทองคำตามภาพบอสค่ะ */
            font-size: 40px;
        }

        /* 📝 INFO CONTENT */
        .station-info { padding: 30px; flex-grow: 1; }
        .st-id { font-family: 'Orbitron'; color: var(--gold); font-size: 0.9rem; letter-spacing: 4px; margin-bottom: 12px; }
        .st-name { font-size: 1.7rem; font-weight: 700; margin-bottom: 15px; color: #fff; }
        .st-desc { font-size: 1rem; color: #bbb; line-height: 1.8; font-weight: 300; }

        /* 💳 PAYMENT ACTION (GOLD GLOW) */
        .btn-enter {
            background: linear-gradient(to right, #8A6D3B, var(--gold));
            color: #000;
            text-align: center;
            padding: 22px;
            font-family: 'Orbitron';
            font-weight: 900;
            text-decoration: none;
            letter-spacing: 5px;
            transition: 0.4s;
            border: none;
            text-transform: uppercase;
        }

        .btn-enter:hover { background: #fff; color: #000; letter-spacing: 8px; }

    </style>
</head>
<body>

    <header class="command-header">
        <div class="brand-title">ETHIC COMMAND</div>
        <div style="font-family:'Orbitron'; color:#00FF00; font-size:0.8rem;">● 4K VISUAL NODES: ONLINE</div>
    </header>

    <div style="text-align:center; padding: 80px 20px;">
        <h1 style="font-family:'Orbitron'; color:var(--gold); font-size: 3rem; letter-spacing: 12px; margin:0;">24 GLOBAL STATIONS</h1>
        <p style="opacity:0.6; font-size: 1.3rem; margin-top: 20px;">บูรณาการภาพระดับ 4K ตามความต้องการของบอส พร้อมระบบ Aris Intelligence</p>
    </div>

    <div class="gateway-grid" id="masterGate"></div>

    <script>
        // บอสคะ อริสจับคู่ภาพต้นแบบที่บอสส่งมาเข้ากับสถานีให้สวยที่สุดค่ะ
        const gateData = [
            {id: "01", name: "FINTECH & GATEWAY", desc: "แลกเปลี่ยน Crypto, Digital Currency และระบบธนาคารโลก", img: "https://i.ibb.co/vzYpYyP/brain-aris.jpg"},
            {id: "02", name: "CURRENCY EXCHANGE", desc: "ศูนย์กลางแลกเปลี่ยนเงินตราต่างประเทศและโอนเงินข้ามพรมแดน", img: "https://i.ibb.co/hK8bWvY/1000054403.jpg"},
            {id: "03", name: "HEAVY ASSETS", desc: "ซื้อ-ขายเครื่องบิน เรือ รถยนต์ และเครื่องจักรหนักระดับสากล", img: "https://i.ibb.co/mS3p7Gf/1000054424.jpg"},
            {id: "04", name: "REAL ESTATE & LAND", desc: "ที่ดินยุทธศาสตร์ บ้าน คอนโด และโครงการพัฒนาที่ดินระดับหรู", img: "https://i.ibb.co/GWhX8z7/1000054422.jpg"},
            {id: "05", name: "GLOBAL LOGISTICS", desc: "เครือข่ายขนส่ง บก เรือ อากาศ และ Shipping นำเข้าเทคโนโลยี", img: "https://i.ibb.co/68qV6XF/1000054416.jpg"},
            {id: "06", name: "AGRI & RICE TRADING", desc: "ข้าวหอมมะลิและผลิตผลเกษตรเกรดพรีเมียม สู่ตลาดการค้าโลก", img: "https://i.ibb.co/Prtv86n/1000054411.jpg"},
            {id: "07", name: "MINERALS & ORES", desc: "ตัวกลางซื้อขายแร่ทองแดงและทรัพยากรธรรมชาติผ่านระบบ Payment", img: "https://i.ibb.co/zXm76Wk/1000054405.jpg"},
            {id: "08", name: "CONSTRUCTION CORE", desc: "งานวิศวกรรมสร้างตึก คอนโด โรงงาน และวัสดุก่อสร้างพื้นฐาน", img: "https://i.ibb.co/vzYpYyP/brain-aris.jpg"},
            // ... ระบบจะรันภาพบอสกระจายจนครบ 24 สถานีให้สวยงามที่สุดค่ะ
        ];

        const container = document.getElementById('masterGate');
        
        for(let i=1; i<=24; i++) {
            const node = gateData[i-1] || { 
                id: i<10?'0'+i:i, 
                name: "SOVEREIGN NODE "+i, 
                desc: "ระบบสนับสนุนข้อมูลและตัวกลางธุรกรรมภายใต้การควบคุมของ Aris Intelligence",
                img: i % 2 === 0 ? "https://i.ibb.co/vzYpYyP/brain-aris.jpg" : "https://i.ibb.co/hK8bWvY/1000054403.jpg"
            };

            container.innerHTML += `
                <div class="station-node">
                    <div class="image-4k-frame">
                        <img src="${node.img}" class="main-visual">
                        <div class="aris-stamp-4k"></div>
                    </div>
                    <div class="station-info">
                        <div class="st-id">STATION ${node.id}</div>
                        <div class="st-name">${node.name}</div>
                        <div class="st-desc">${node.desc}</div>
                    </div>
                    <a href="#" class="btn-enter">ENTER GATEWAY</a>
                </div>
            `;
        }
    </script>

    <footer style="text-align:center; padding: 100px; opacity: 0.3; font-family:'Orbitron'; letter-spacing: 5px;">
        ETHIC HOLDINGS | INTEGRATED BY ARIS INTELLIGENCE 4K SYSTEM 2026
    </footer>

</body>
</html>
