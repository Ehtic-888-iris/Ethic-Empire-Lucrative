<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EHT HOLDINGS</title>

<style>
:root {
    --gold:#D4AF37;
    --dark:#000;
    --blue:#00eaff;
}

body {
    margin:0;
    font-family:Segoe UI;
    background:#000;
    color:#fff;
}

/* HERO IMAGE */
.hero {
    position:relative;
    height:400px;
    background:url('https://images.unsplash.com/photo-1639322537228-f710d846310a') center/cover;
}

.hero::after {
    content:'';
    position:absolute;
    width:100%;height:100%;
    background:linear-gradient(to bottom,rgba(0,0,0,0.3),#000);
}

.hero-content {
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.hero h1 {
    font-size:60px;
    color:var(--gold);
    text-shadow:0 0 30px var(--gold);
}

/* WALLET */
.wallet {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:-50px;
}

.box {
    background:linear-gradient(145deg,#111,#000);
    border:1px solid var(--gold);
    padding:25px;
    border-radius:20px;
    min-width:200px;
    text-align:center;
    box-shadow:0 0 20px rgba(212,175,55,0.3);
}

.big {
    font-size:28px;
    color:var(--gold);
}

/* STATUS */
.active {
    color:#00ff6a;
    font-weight:bold;
}

/* NODES */
.nodes {
    padding:40px 20px;
    text-align:center;
}

.nodes h2 {
    color:var(--blue);
    letter-spacing:4px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-top:20px;
}

.node {
    border:2px solid var(--blue);
    padding:20px;
    border-radius:15px;
    color:var(--blue);
    cursor:pointer;
    transition:0.3s;
}

.node:hover {
    background:var(--blue);
    color:#000;
    box-shadow:0 0 20px var(--blue);
}

@media(max-width:600px){
    .grid {grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>EHT</h1>
        <p>ETHIC HOLDINGS THAI</p>
    </div>
</div>

<div class="wallet">
    <div class="box">
        <div>฿</div>
        <div class="big">3,500,000,000</div>
    </div>
    <div class="box">
        <div>STATUS</div>
        <div class="active">ACTIVE</div>
    </div>
</div>

<div class="nodes">
    <h2>24 COMMAND NODES</h2>
    <div class="grid" id="grid"></div>
</div>

<script>
const grid=document.getElementById("grid");

for(let i=1;i<=24;i++){
    let d=document.createElement("div");
    d.className="node";
    d.innerHTML="NODE "+(i<10?"0"+i:i);
    grid.appendChild(d);
}
</script>

</body>
</html>
