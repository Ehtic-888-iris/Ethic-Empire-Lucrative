<audio id="teacherSong" loop>
    <source src="ชื่อไฟล์เพลงของบอส.mp3" type="audio/mpeg">
</audio>
<div id="play-btn" onclick="playMusic()" style="position:fixed; bottom:20px; right:20px; background:var(--gold); color:black; padding:15px; border-radius:50%; cursor:pointer; z-index:10001; box-shadow:0 0 20px var(--gold); font-weight:bold;">🎵</div>

<script>
function playMusic() {
    var song = document.getElementById("teacherSong");
    if (song.paused) { song.play(); document.getElementById('play-btn').innerHTML = "⏸"; }
    else { song.pause(); document.getElementById('play-btn').innerHTML = "🎵"; }
}
</script>


<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHT - SUPREME COMMAND CENTER 24</title>
    <style>
        :root { --gold: #AD4F37; --gold-light: #E0C097; --cyan: #00f3ff; --bg: #020202; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; text-align: center; line-height: 1.6; }
        .galaxy { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: -1; animation: rotateGalaxy 120s linear infinite; }
        @keyframes rotateGalaxy { from { transform: rotate(0deg) scale(1.1); } to { transform: rotate(360deg) scale(1.1); } }
        header { padding: 40px 20px; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .logo { font-size: clamp(30px, 8vw, 60px); font-weight: 900; color: var(--gold); text-shadow: 0 0 30px var(--gold); letter-spacing: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1400px; margin: 40px auto; padding: 20px; }
        .node { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 12px; height: 320px; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; }
        .node-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: sepia(1) saturate(1.5); transition: 0.4s; }
        .node:hover .node-img { opacity: 1; filter: none; transform: scale(1.1); }
        .node-info { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(to top, black, transparent); box-sizing: border-box; text-align: left; z-index: 2; }
        .node strong { color: var(--gold); font-size: 1.1rem; }
        .node:hover { box-shadow: 0 0 30px var(--cyan); border-color: white; }

        /* หน้าจอบังคับการ (IRIS System Panel) */
        .iris-panel { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 100; display: none; padding: 20px; box-sizing: border-box; }
        .close-panel { color: var(--gold); font-size: 40px; cursor: pointer; position: absolute; top: 10px; right: 20px; z-index: 101; }
        .iris-content { max-width: 1200px; margin: 60px auto; color: #ccc; }
        .command-center-img { width: 100%; max-height: 80vh; object-fit: contain; border-radius: 15px; border: 2px solid var(--gold); box-shadow: 0 0 50px rgba(173, 79, 55, 0.5); }
    </style>
</head>
<body>
    <div class="galaxy"></div>
    <header><div class="logo">EHT</div><div style="color:var(--gold-light); letter-spacing:5px;">ETHIC HIGHER TIME</div></header>
    <h3>BOSS & IRIS: COMMAND CENTER 24</h3>
    <div class="grid" id="grid"></div>
    
    <div class="iris-panel" id="irisPanel">
        <span class="close-panel" onclick="closeIris()">×</span>
        <div class="iris-content">
            <h1 style="color:var(--gold);">ETHIC HOLDINGS: ศูนย์บัญชาการมหาอำนาจ</h1>
            <img src="image_7.png" class="command-center-img">
            <p id="panelContent"></p>
        </div>
    </div>

    <script>
        const stations = [
            { n: "R&D Lab / ศูนย์วิจัย", i: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800" },
            { n: "EV Model / ยานยนต์", i: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=800" },
            { n: "Logistics / ขนส่งโลก", i: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=800" },
            { n: "Defense / ระบบป้องกัน", i: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800" },
            { n: "Global Hospital / การแพทย์", i: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=800" },
            { n: "Vessels / เรือพาณิชย์", i: "https://images.pexels.com/photos/10368143/pexels-photo-10368143.jpeg?w=800" },
            { n: "Global Cinema / โรงหนัง", i: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=800" },
            { n: "Unified Bank / ธนาคาร", i: "https://images.unsplash.com/photo-1501167786227-4cba60f6d58f?w=800" },
            { n: "Marketplace / ตลาดโลก", i: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800" },
            { n: "Payment Gateway", i: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=800" },
            { n: "Estate / อสังหาฯ", i: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800" },
            { n: "Gold Reserve / คลังทอง", i: "https://images.unsplash.com/photo-1610375461246-83df859d849d?w=800" },
            { n: "Mining / เหมืองแร่ดิจิทัล", i: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=800" },
            { n: "AI Network / โครงข่าย AI", i: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800" },
            { n: "Smart City / เมืองใหม่", i: "https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=800" },
            { n: "Energy / พลังงานโลก", i: "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=800" },
            { n: "Space Tech / อวกาศ", i: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=800" },
            { n: "Cyber Security / ไซเบอร์", i: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800" },
            { n: "Food / นวัตกรรมอาหาร", i: "https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=800" },
            { n: "Water / ระบบน้ำโลก", i: "https://images.unsplash.com/photo-1601004128036-646d0a7a40b3?w=800" },
            { n: "Charity / มูลนิธิ", i: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=800" },
            { n: "Education / การศึกษา", i: "https://images.unsplash.com/photo-1509062522246-3755977927d7?w=800" },
            { n: "Comm / การสื่อสารโลก", i: "https://images.unsplash.com/photo-1516387933931-133d132d73d5?w=800" },
            // MAHA AMNAT: ไอริสใช้รูปศูนย์บัญชาการโฮโลแกรมทองคำให้เป็นสัญลักษณ์มหาอำนาจขั้นสุดค่ะ
            { n: "MAHA AMNAT / มหาอำนาจ", i: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800" }
        ];
        const g = document.getElementById('grid');
        stations.forEach((s, idx) => {
            let div = document.createElement('div');
            div.className = 'node';
            div.innerHTML = `<img src="${s.i}" class="node-img"><div class="node-info"><strong>STATION ${String(idx+1).padStart(2,'0')}</strong><br>${s.n}</div>`;
            div.onclick = () => openIris(s.n, idx === 23); // idx 23 คือ MAHA AMNAT
            g.appendChild(div);
        });

        function openIris(name, isMahaAmnat) {
            document.getElementById('irisPanel').style.display = 'block';
            if (isMahaAmnat) {
                // หากกด MAHA AMNAT จะแสดงข้อความต้อนรับเข้าศูนย์บัญชาการ
                document.getElementById('panelContent').innerText = `จอมทัพเสด็จสู่ศูนย์บัญชาการ EHT แล้ว... ทุกสถานีพร้อมสั่งการ! (นี่คือรูปศูนย์บัญชาการที่คุณต้องการค่ะบอส!)`;
            } else {
                document.getElementById('panelContent').innerText = `ระบบกำลังเชื่อมต่อเข้าสู่ ${name}... (กำลังเตรียมรายละเอียดธุรกิจมหาอำนาจในอนาคตค่ะบอส!)`;
            }
        }
        function closeIris() { document.getElementById('irisPanel').style.display = 'none'; }
    </script>
</body>
</html>
