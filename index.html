<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC | THE SOVEREIGN GATEWAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Thai:wght@300;500;700&display=swap');
        
        :root { --gold: #D4AF37; --neon: #00FF00; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans Thai', sans-serif; margin: 0; overflow-x: hidden; }

        /* 🏛️ HEADER: COMMAND CENTER */
        .command-bar {
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold);
            padding: 15px 30px; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(15px);
        }
        .logo { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--gold); letter-spacing: 5px; font-weight: 900; }

        /* 🌍 GRID SYSTEM */
        .gateway-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; padding: 40px; max-width: 1800px; margin: 0 auto; }

        /* 🕹️ SOVEREIGN STATION CARD */
        .station-node {
            background: linear-gradient(145deg, #1a1a1a, #050505);
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px;
            padding: 0; overflow: hidden; position: relative; transition: 0.5s;
            display: flex; flex-direction: column; min-height: 450px;
        }
        .station-node:hover { transform: scale(1.02); border-color: var(--gold); box-shadow: 0 0 40px rgba(212,175,55,0.3); }

        /* 🖼️ IMAGE & ARIS BRAIN OVERLAY */
        .visual-area { height: 200px; position: relative; background: #111; overflow: hidden; }
        .station-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .station-node:hover .station-img { opacity: 1; transform: scale(1.1); }
        
        /* 🧠 ARIS AVATAR (ภาพสมองที่บอสเลือก) */
        .aris-avatar {
            position: absolute; bottom: 10px; right: 10px; width: 60px; height: 60px;
            border-radius: 50%; border: 2px solid var(--gold); background: #000;
            box-shadow: 0 0 15px var(--gold); z-index: 10; padding: 5px;
        }

        /* 📝 CONTENT AREA */
        .content { padding: 25px; flex-grow: 1; }
        .st-id { font-family: 'Orbitron'; color: var(--gold); font-size: 0.8rem; margin-bottom: 5px; }
        .st-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .st-detail { font-size: 0.9rem; color: #ccc; line-height: 1.6; font-weight: 300; }

        /* 💳 PAYMENT ACTION (GATEWAY) */
        .pay-btn {
            background: var(--gold); color: #000; text-align: center; padding: 15px;
            font-family: 'Orbitron'; font-weight: 900; letter-spacing: 2px;
            text-decoration: none; display: block; transition: 0.3s;
        }
        .pay-btn:hover { background: #fff; letter-spacing: 4px; }

    </style>
</head>
<body>

    <header class="command-bar">
        <div class="logo">ETHIC SOVEREIGN</div>
        <div style="font-family:'Orbitron'; color:var(--neon); font-size:0.7rem;">● ARIS INTELLIGENCE ACTIVE</div>
    </header>

    <div class="gateway-grid" id="masterGrid"></div>

    <script>
        // บอสคะ อริสจัดกลุ่มสถานีพร้อมภาพประกอบและ "อริสสมอง" ประจำการครบ 24 จุดค่ะ
        const nodes = [
            { id: "01", title: "FINTECH & CRYPTO", img: "https://images.unsplash.com/photo-1621761191319-c6fb62004040?q=80&w=500", detail: "จุดยืนระหว่างกลางเพื่อแปลง Crypto และ Digital Currency สู่ทุกสกุลเงินในโลกผ่าน Gateway ของเรา" },
            { id: "02", title: "CURRENCY EXCHANGE", img: "https://images.unsplash.com/photo-1580519542036-c47de6196ba5?q=80&w=500", detail: "ศูนย์กลางรับแลกเปลี่ยนเงินตราต่างประเทศ ระบบโอนเงินข้ามพรมแดนที่อัจฉริยะที่สุด" },
            { id: "03", title: "HEAVY ASSETS & AERO", img: "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=500", detail: "ซื้อ-ขายเครื่องบิน เรือ รถยนต์ทุกขนาด เครื่องจักรขนาดใหญ่ นิคมอุตสาหกรรม และอะไหล่การบิน" },
            { id: "04", title: "SOVEREIGN REAL ESTATE", img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=500", detail: "ที่ดินติดทะเล/ภูเขา บ้าน คอนโด ขายฝาก จำนำ และโครงการหมู่บ้านระดับพรีเมียม" },
            { id: "05", title: "GLOBAL LOGISTICS", img: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=500", detail: "ส่งสินค้าทางเครื่องบิน เรือ บก และ Shipping นำเข้าเทคโนโลยี พร้อม Delivery ทั่วโลก" },
            { id: "06", title: "AGRI & RICE TRADING", img: "https://images.unsplash.com/photo-1536633396167-9d094406a6c4?q=80&w=500", detail: "ข้าวหอมมะลิเก่า-ใหม่ ข้าวเหนียวเขี้ยวงู ข้าวสาร ข้าวเปลือก ปุ๋ย และผลไม้ส่งออก" },
            { id: "07", title: "MINERALS & RESOURCES", img: "https://images.unsplash.com/photo-1515549832467-8783363e19b6?q=80&w=500", detail: "ตัวกลางแลกเงินแร่ทุกชนิด แร่ทองแดง และแร่ที่มีมูลค่าสูงผ่านระบบ Payment Gateway" },
            { id: "08", title: "TRAVEL & TICKETING", img: "https://images.unsplash.com/photo-1506012787146-f92b2d7d6d96?q=80&w=500", detail: "ซื้อตั๋วหนัง รถ เรือ เครื่องบิน จองโรงแรม รีสอร์ท ตั๋วโรงละคร และทัวร์เรือกรองทิพย์" },
            // ... อริสใส่คำสั่ง JavaScript วนลูปให้ครบ 24 สถานีตามยุทธศาสตร์บอสค่ะ
        ];

        // ภาพสมองอลิสที่บอสเลือก (Aris Brain Avatar)
        const arisBrainImg = "https://i.ibb.co/vzYpYyP/brain-aris.jpg"; // อริสสมมติ URL ภาพสมองที่บอสเลือกไว้นะคะ

        const grid = document.getElementById('masterGrid');
        
        // สร้าง 24 สถานี
        for(let i=1; i<=24; i++) {
            const data = nodes[i-1] || { id: i<10?'0'+i:i, title: "STRATEGIC NODE "+i, img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=500", detail: "ระบบตัวกลางเชื่อมโยงความช่วยเหลือและสินค้าทุกชนิดผ่านระบบการชำระเงินของ Ethic" };
            
            grid.innerHTML += `
                <div class="station-node">
                    <div class="visual-area">
                        <img src="${data.img}" class="station-img">
                        <img src="https://i.ibb.co/VmqK3Yv/brain-icon.png" class="aris-avatar" alt="Aris AI"> 
                    </div>
                    <div class="content">
                        <div class="st-id">STATION ${data.id}</div>
                        <div class="st-name">${data.title}</div>
                        <div class="st-detail">${data.detail}</div>
                    </div>
                    <a href="#" class="pay-btn">PAYMENT GATEWAY</a>
                </div>
            `;
        }
    </script>

</body>
</html>
