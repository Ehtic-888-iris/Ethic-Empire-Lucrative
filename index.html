                nodeElement.className = 'station-node';
                nodeElement.innerHTML = `
                    <div class="visual-frame">
                        <img src="${finalImageUrl}" 
                             alt="${node.title}" 
                             loading="lazy"
                             onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1200';">
                        
                        ${isSpaceNode ? '<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.2);pointer-events:none;"></div>' : ''}
                        
                        <div class="aris-intelligence-seal"></div>
                    </div>
                    
                    <div class="node-content">
                        <span class="st-label">STATION ${node.id}</span>
                        <h2 class="st-title">${node.title}</h2>
                        <p class="st-description">${node.desc}</p>
                        
                        <button class="btn-command" onclick="activateGateway('${node.id}')">
                            ENTER GATEWAY
                        </button>
                    </div>
                `;
                
                engineContainer.appendChild(nodeElement);
            });
        };

        /**
         * 🕹️ INTERACTIVE SYSTEM LOGIC
         * ระบบตอบสนองเมื่อมีการสัมผัสหรือสั่งการเข้าสู่ Gateway
         */
        const activateGateway = (id) => {
            console.log(`[SYSTEM]: Station ${id} Gateway Activating...`);
            alert(`ARIS INTELLIGENCE: กำลังนำบอสเข้าสู่ระบบงานสถานีที่ ${id}\nสถานะ: ปลดล็อกระดับสูงสุด (Level 10)`);
        };

        // เริ่มต้นการทำงานของระบบทั้งหมด
        window.addEventListener('DOMContentLoaded', () => {
            console.log("%c ARIS CORE UNLOCKED 100% ", "background: #D4AF37; color: #000; font-size: 20px; font-weight: bold;");
            renderNodes();
        });

    </script>
</body>
</html>
