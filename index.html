<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETHIC HOLDINGS THAI | Global Infrastructure & Universal Gateway</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #AD4F37; /* สีมหาอำนาจที่บอสเลือก */
            --bg-deep: #050a14;
            --bg-panel: rgba(13, 27, 42, 0.95);
            --accent-green: #00e676;
            --text-light: #f4f5f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg-deep); color: var(--text-light); overflow-x: hidden; }

        /* Security Bar: แถบความปลอดภัยระดับกองกำลังทหาร */
        .security-bar {
            background: linear-gradient(90deg, #000, var(--gold));
            padding: 10px; text-align: center; border-bottom: 1px solid var(--gold);
            font-size: 0.8rem; letter-spacing: 2px; position: sticky; top: 0; z-index: 1100;
        }

        /* Hero Header: หน้าต่างแห่งโลกใหม่ของ EHT */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('1000052408.png');
            background-size: cover; background-position: center;
            padding: 120px 20px; text-align: center; border-bottom: 5px solid var(--gold);
        }
        header h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(1.8rem, 5vw, 3.5rem); color: var(--gold); letter-spacing: 8px; text-transform: uppercase; text-shadow: 0 0 20px rgba(173,79,55,0.5); }
        header p { font-size: 1rem; opacity: 0.8; letter-spacing: 2px; margin-top: 10px; }
                /* Dashboard Grid: โครงสร้างสถานีมหาอำนาจ 24 แห่ง */
        .dashboard-container { padding: 60px 5%; max-width: 1400px; margin: auto; }
        .grid-24 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid-24 { grid-template-columns: repeat(4, 1fr); gap: 25px; } }

        .station-node {
            background: var(--bg-panel); border: 1px solid rgba(173, 79, 55, 0.2);
            border-radius: 15px; padding: 30px 15px; text-align: center; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .station-node:hover { transform: translateY(-12px); border-color: var(--gold); box-shadow: 0 15px 40px rgba(173, 79, 55, 0.3); }
        .station-node i { font-size: 2.8rem; color: var(--gold); margin-bottom: 18px; display: block; }
        .station-node h3 { font-size: 0.85rem; letter-spacing: 1.5px; color: #fff; text-transform: uppercase; font-weight: 600; }

        /* Portal Modal: ประตูบานที่สวยงามที่สุดสำหรับนักลงทุน */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal-content { background: #000; border: 2px solid var(--gold); padding: 45px; width: 90%; max-width: 650px; border-radius: 5px; text-align: left; position: relative; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close { position: absolute; top: 15px; right: 25px; font-size: 35px; color: var(--gold); cursor: pointer; }
        .close:hover { color: #fff; }
        
        .m-header { color: var(--gold); font-size: 1.6rem; margin-bottom: 20px; border-left: 5px solid var(--gold); padding-left: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .m-desc { line-height: 1.8; color: #ccc; margin-bottom: 30px; font-size: 1rem; }
                /* Gateway Interface: พื้นที่รองรับธุรกรรมมหาอำนาจ */
        .gateway-box { background: rgba(173, 79, 55, 0.1); padding: 25px; border: 1px dashed var(--gold); border-radius: 10px; margin-bottom: 25px; }
        .gateway-box p { font-size: 0.85rem; color: var(--gold); margin-bottom: 10px; }
        .pay-icons { display: flex; gap: 20px; font-size: 1.5rem; color: #fff; opacity: 0.7; }

        /* Button: ปุ่มเปิดประตูสู่ความสุขเพียงปลายนิ้วเดียว */
        .btn-gateway { background: var(--gold); color: #fff; border: none; padding: 22px; width: 100%; font-weight: 700; cursor: pointer; letter-spacing: 3px; font-size: 1rem; transition: 0.3s; border-radius: 5px; }
        .btn-gateway:hover { background: #fff; color: var(--gold); box-shadow: 0 0 20px #fff; }

        /* Footer: การประกาศศักยภาพและความซื่อสัตย์ */
        footer { padding: 60px 20px; text-align: center; background: #000; border-top: 1px solid var(--gold); }
        footer p { color: var(--gold); letter-spacing: 3px; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="security-bar">

</div>

<div class="dashboard-container">

<div id="pModal" class="modal">

        <div class="gateway-box">
            <p><i class="fas fa-shield-check"></i> SECURE TRANSACTION INTERFACE</p>
            <div class="pay-icons">
                <i class="fab fa-bitcoin" title="Bitcoin"></i>
                <i class="fab fa-ethereum" title="Ethereum"></i>
                <i class="fas fa-coins" title="Digital Currency"></i>
                <i class="fas fa-university" title="Bank Transfer"></i>
            </div>
        </div>
        <button class="btn-gateway" onclick="alert('CONNECTING TO EHT UNIVERSAL PAYMENT GATEWAY...')">OPEN THE DOOR TO HAPPINESS</button>
    </div>
</div>

<script>
    // ฐานข้อมูลสถานียุทธศาสตร์ (บอสสามารถเพิ่มให้ครบ 24 ได้ที่นี่)
    const stations = [
        { n: "Digital Currency Exchange", icon: "fa-exchange-alt", d: "ศูนย์กลางการแลกเปลี่ยน Crypto และ Digital Currency ทุกสกุลทั่วโลก รองรับทั้งการซื้อ ขาย และถอนเงินสดผ่าน Payment Gateway ที่ปลอดภัยที่สุด" },
        { n: "Real Estate Acquisition", icon: "fa-building", d: "จัดหาและบริหารโครงการอสังหาริมทรัพย์ระดับพรีเมียม คอนโด บ้าน หรือที่ดินยุทธศาสตร์ ภูเขา-ทะเล รองรับการลงทุนด้วยสินทรัพย์ดิจิทัล" },
        { n: "Global Infrastructure", icon: "fa-city", d: "การลงทุนและพัฒนาโครงสร้างพื้นฐานขนาดใหญ่ สนามบิน ระบบราง รถไฟฟ้า นิคมอุตสาหกรรม และโครงการ Mega Project ระดับมหาอำนาจ" },
        { n: "Emergency Response", icon: "fa-ambulance", d: "หน่วยช่วยเหลือฉุกเฉิน 24 ชม. จัดหาโรงพยาบาลด่วน รถแอมบูแลนซ์ รถยก และประสานงานประกันภัยทันทีดุจญาติมิตร" },
        { n: "Wealth Management", icon: "fa-chart-line", d: "แผนบริหารความมั่งคั่ง การออมเงิน ทอง หุ้น และตราสารหนี้ เพื่อสร้างกำไรระยะสั้นและรากฐานที่มั่นคงให้ครอบครัวและบุตรหลาน" },
        { n: "Global Logistics", icon: "fa-ship", d: "ระบบขนส่งสินค้าครบวงจร บก-น้ำ-อากาศ และ Shipping สากล บริการจัดส่งสินค้าทุกขนาดจากโรงงานทั่วโลกถึงมือคุณอย่างปลอดภัย" },
        { n: "Supreme Defense", icon: "fa-shield-military", d: "หน่วยอารักขาส่วนบุคคล (Bodyguard) ทีมทนายความมืออาชีพ และระบบป้องกัน Cyber Attack ที่ป้องกันการเจาะข้อมูลทุกรูปแบบ" },
        { n: "Industrial Sourcing", icon: "fa-industry", d: "จัดหาเครื่องจักรหนัก หุ่นยนต์อุตสาหกรรม และระบบโรงงานอุตสาหกรรมที่ได้มาตรฐานสากลในราคาโรงงาน" }
    ];

    const grid = document.getElementById('stationGrid');
    stations.forEach(s => {
        const div = document.createElement('div');
        div.className = 'station-node';
        div.innerHTML = `<i class="fas ${s.icon}"></i><h3>${s.n}</h3>`;
        div.onclick = () => {
            document.getElementById('mHeader').innerText = s.n;
            document.getElementById('mDesc').innerText = s.d;
            document.getElementById('pModal').style.display = 'flex';
        };
        grid.appendChild(div);
    });

    function closeM() { document.getElementById('pModal').style.display = 'none'; }
    window.onclick = function(e) { if(e.target == document.getElementById('pModal')) closeM(); }
<<footer>
    <p>ETHIC HOLDINGS THAI CO., LTD.</p>
    <div style="font-size:0.7rem; color:#555; letter-spacing:1px; line-height:2;">
        INFRASTRUCTURE | INNOVATION | UNIVERSAL GATEWAY | SECURITY<br>
        ความซื่อสัตย์และบริการระดับมืออาชีพ คือหัวใจมหาอำนาจของเรา<br>
        <span style="color:var(--gold); opacity:0.8;">"ดูแลคุณ... ดุจญาติผู้ใหญ่ที่เราเคารพรัก"</span>
    </div>
