<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC COMMAND | THE 24 SOVEREIGN NODES UNLOCKED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Thai:wght@300;500;700&display=swap');

        :root {
            --gold: #D4AF37;
            --gold-bright: #F9E29C;
            --bg: #000000;
            --pink: #FF69B4;
            --neon: #00FF00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans Thai', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* 👑 COMMAND HEADER */
        header {
            background: rgba(0,0,0,0.98);
            border-bottom: 3px solid var(--gold);
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 9999;
            backdrop-filter: blur(30px);
        }

        .brand {
            font-family: 'Orbitron';
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 12px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        /* 🏛️ 3D GATEWAY ENGINE */
        .master-container {
            max-width: 1920px;
            margin: 0 auto;
            padding: 80px 40px;
            perspective: 3000px;
        }

        .grid-system {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 40px;
        }

        /* 🕹️ STATION CARD (4K 3D DEPTH) */
        .node {
            background: linear-gradient(145deg, #1a1a1a, #050505);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            transform-style: preserve-3d;
            min-height: 620px;
            display: flex;
            flex-direction: column;
        }

        .node:hover {
            transform: rotateY(10deg) rotateX(5deg) translateY(-20px) translateZ(50px);
            border-color: var(--gold);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), 0 0 30px rgba(212, 175, 55, 0.3);
        }

        /* 🖼️ 4K VISUAL CORE */
        .visual {
            height: 300px;
            position: relative;
            background: #000;
            border-bottom: 2px solid var(--gold);
            overflow: hidden;
        }

        .visual img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.8; transition: 1.5s ease;
            filter: contrast(110%) brightness(80%);
        }

        .node:hover img {
            opacity: 1; transform: scale(1.15) rotate(1deg);
            filter: contrast(120%) brightness(100%);
        }

        /* 🧠 ARIS BRAIN SEAL (THE PINK INTELLIGENCE) */
        .aris-seal {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.9);
            border: 3px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px var(--gold);
            z-index: 100;
        }

        .aris-seal::after {
            content: '🧠'; font-size: 40px;
            filter: drop-shadow(0 0 10px var(--pink));
        }

        /* 📝 CONTENT PANE */
        .info { padding: 40px; flex-grow: 1; display: flex; flex-direction: column; }
        .st-num { font-family: 'Orbitron'; color: var(--gold); font-size: 1rem; letter-spacing: 5px; margin-bottom: 10px; }
        .st-name { font-size: 1.8rem; font-weight: 900; color: #fff; margin-bottom: 15px; letter-spacing: 1px; }
        .st-desc { font-size: 1.05rem; color: #ccc; line-height: 1.8; font-weight: 300; margin-bottom: 30px; }

        /* 💳 PAYMENT ACTION */
        .btn-gate {
            background: linear-gradient(90deg, #8A6D3B, var(--gold), #8A6D3B);
            background-size: 200% auto;
            color: #000; text-align: center; padding: 22px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem;
            letter-spacing: 5px; text-decoration: none; transition: 0.5s;
            border-radius: 0 0 30px 30px; margin-top: auto;
        }

        .btn-gate:hover { background-position: right center; letter-spacing: 10px; color: #fff; }

        /* 🌌 SPACE OVERLAY (12-24) */
        .space-fx {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">ETHIC COMMAND</div>
        <div style="font-family:'Orbitron'; color:var(--neon); font-size:0.75rem;">● CORE UNLOCKED: ALL 24 NODES ONLINE</div>
    </header>

    <div class="master-container">
        <div class="grid-system" id="engine"></div>
    </div>

    <script>
        const db = [
            { id: "01", t: "FINTECH & GATEWAY", d: "จุดเชื่อมต่อเงินดิจิทัล คริปโต และระบบธนาคารโลก", k: "cryptocurrency,gold" },
            { id: "02", t: "CURRENCY EXCHANGE", d: "แลกเปลี่ยนเงินตราและโอนเงินข้ามพรมแดนทันที", k: "money,bank" },
            { id: "03", t: "HEAVY ASSETS", d: "ดีลเลอร์เครื่องบิน เรือ รถหรู และเครื่องจักรหนัก", k: "privatejet,luxury" },
            { id: "04", t: "REAL ESTATE", d: "ที่ดินยุทธศาสตร์ คอนโด และโครงการเมืองอัจฉริยะ", k: "modern,architecture" },
            { id: "05", t: "GLOBAL LOGISTICS", d: "ระบบขนส่งข้ามโลก บก เรือ อากาศ และ Shipping", k: "logistics,shipping" },
            { id: "06", t: "AGRI & COMMODITIES", d: "ข้าวหอมมะลิ สินค้าเกษตร และทรัพยากรส่งออก", k: "rice,farm" },
            { id: "07", t: "MINERALS & ORES", d: "ซื้อขายแร่ทองแดงและแร่ล้ำค่าระดับอุตสาหกรรม", k: "minerals,copper" },
            { id: "08", t: "CONSTRUCTION CORE", d: "งานวิศวกรรมโครงสร้าง ตึกระฟ้า และวัสดุก่อสร้าง", k: "construction,building" },
            { id: "09", t: "TRAVEL BOOKING", d: "จองโรงแรม ตั๋วเครื่องบิน และไลฟ์สไตล์ระดับหรู", k: "resort,travel" },
            { id: "10", t: "ENERGY & SOLAR", d: "พลังงานสะอาดและเทคโนโลยีเชื้อเพลิงแห่งอนาคต", k: "solar,energy" },
            { id: "11", t: "HEALTH & SECURITY", d: "ศูนย์พยาบาลและระบบรักษาความปลอดภัยสูงสุด", k: "security,hospital" }
        ];

        const engine = document.getElementById('engine');

        for(let i=1; i<=24; i++) {
            const data = db[i-1];
            const isSpace = i >= 12;
            const title = data ? data.t : `GALAXY NODE ${i}`;
            const desc = data ? data.d : "การขยายอาณาจักรสู่ห้วงอวกาศภายใต้การควบคุมของ Aris Intelligence";
            const key = isSpace ? "galaxy,space,planet" : (data ? data.k : "technology,future");
            
            // 4K Image Connector with Signature for stability
            const imgUrl = `https://images.unsplash.com/photo-${i === 5 ? '1586528116311-ad8dd3c8310d' : (i === 7 ? '1515549833407-98e57b3000b8' : '1451187580459-43490279c0fa')}?auto=format&fit=crop&q=80&w=1000&sig=${i+200}`;

            engine.innerHTML += `
                <div class="node">
                    <div class="visual">
                        <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/1000x600/000/D4AF37?text=ETHIC+NODE+${i}'">
                        ${isSpace ? '<div class="space-fx"></div>' : ''}
                        <div class="aris-seal"></div>
                    </div>
                    <div class="info">
                        <div class="st-num">STATION ${i < 10 ? '0'+i : i}</div>
                        <div class="st-name">${title}</div>
                        <div class="st-desc">${desc}</div>
                    </div>
                    <a href="#" class="btn-gate">ENTER GATEWAY</a>
                </div>
            `;
        }
    </script>
</body>
</html>
