<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC COMMAND | THE 24 GLOBAL STATIONS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Thai:wght@300;500;700&display=swap');
        
        :root {
            --gold-gradient: linear-gradient(135deg, #D4AF37 0%, #F9E29C 50%, #8A6D3B 100%);
            --aris-pink: #FF69B4;
            --bg-deep: #000000;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Noto Sans Thai', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* 👑 COMMAND HEADER */
        .header {
            border-bottom: 2px solid #D4AF37;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .brand {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            font-weight: 900;
            color: #D4AF37;
            letter-spacing: 5px;
        }

        .status-tag {
            color: #00FF00;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        /* 🏛️ GRID SYSTEM */
        .gateway-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 30px;
            padding: 50px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* 🕹️ STATION CARD 3D */
        .node-card {
            background: #0a0a0a;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .node-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: #D4AF37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }

        /* 🖼️ VISUAL AREA - ฝ่าด่านป้องกัน IMAGE NOT FOUND */
        .visual-area {
            height: 240px;
            background: linear-gradient(45deg, #1a1a1a, #000);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Placeholder 4K ที่เสถียรที่สุด */
        .station-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        /* 🧠 ARIS BRAIN LOGO (ตรงตามภาพ 1000054617) */
        .aris-brain-seal {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: #000;
            border: 3px solid #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #D4AF37;
            z-index: 5;
        }

        .aris-brain-seal::after {
            content: '🧠';
            font-size: 35px;
            filter: drop-shadow(0 0 5px var(--aris-pink));
        }

        /* 📝 CONTENT */
        .info-pane {
            padding: 30px;
            background: linear-gradient(180deg, rgba(15,15,15,0) 0%, rgba(0,0,0,1) 100%);
        }

        .st-label {
            font-family: 'Orbitron';
            color: #D4AF37;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .st-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }

        .st-desc {
            font-size: 0.9rem;
            color: #bbb;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 25px;
            height: 50px;
        }

        /* 💳 ACCESS BUTTON */
        .enter-btn {
            background: var(--gold-gradient);
            color: #000;
            text-align: center;
            padding: 20px;
            font-family: 'Orbitron';
            font-weight: 900;
            text-decoration: none;
            letter-spacing: 5px;
            border-radius: 0 0 20px 20px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .enter-btn:hover {
            background: #fff;
            letter-spacing: 7px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">ETHIC COMMAND</div>
        <div class="status-tag">● 4K VISUAL NODES: ONLINE</div>
    </header>

    <div style="text-align:center; padding: 60px 20px;">
        <h1 style="font-family:'Orbitron'; color:#D4AF37; font-size: 3rem; letter-spacing: 10px;">24 GLOBAL STATIONS</h1>
        <p style="opacity:0.6; font-size: 1.2rem; max-width: 800px; margin: 20px auto;">บูรณาการภาพระดับ 4K ตามความต้องการของบอส พร้อมระบบ Aris Intelligence</p>
    </div>

    <div class="gateway-grid" id="mainEngine"></div>

    <script>
        const stations = [
            { id: "01", t: "FINTECH & GATEWAY", d: "แลกเปลี่ยน Crypto, Digital Currency และระบบธนาคารโลก", img: "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&q=80&w=600" },
            { id: "02", t: "CURRENCY EXCHANGE", d: "ศูนย์กลางแลกเปลี่ยนเงินตราต่างประเทศและโอนเงินข้ามพรมแดน", img: "https://images.unsplash.com/photo-1580519542036-c47de6196ba5?auto=format&fit=crop&q=80&w=600" },
            { id: "03", t: "HEAVY ASSETS & AIRCRAFT", d: "ดีลเลอร์เครื่องบิน เรือ และเครื่องจักรหนักอุตสาหกรรม", img: "https://images.unsplash.com/photo-1559135197-8a45ea74d367?auto=format&fit=crop&q=80&w=600" },
            { id: "04", t: "REAL ESTATE & LAND", d: "ที่ดินยุทธศาสตร์ บ้านหรู และโครงการนิคมอุตสาหกรรม", img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80&w=600" },
            { id: "05", t: "GLOBAL LOGISTICS", d: "ระบบขนส่งข้ามโลก บก เรือ อากาศ และ Shipping", img: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80&w=600" },
            { id: "06", t: "AGRI & COMMODITIES", d: "ข้าวหอมมะลิ สินค้าเกษตร และทรัพยากรอาหารส่งออก", img: "https://images.unsplash.com/photo-1530507629858-e4977d30e9e0?auto=format&fit=crop&q=80&w=600" },
            { id: "07", t: "MINERAL & ORE", d: "การซื้อขายแร่ธาตุล้ำค่าและทรัพยากรธรรมชาติพลังงาน", img: "https://images.unsplash.com/photo-1515549833407-98e57b3000b8?auto=format&fit=crop&q=80&w=600" },
            { id: "08", t: "MASTER CONSTRUCTION", d: "งานวิศวกรรมโครงสร้าง ตึกระฟ้า และโรงงานอุตสาหกรรม", img: "https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&q=80&w=600" },
            // ... (ลูปให้ครบ 24)
        ];

        const engine = document.getElementById('mainEngine');
        
        for(let i=1; i<=24; i++) {
            const data = stations[i-1] || { 
                id: i<10?'0'+i:i, 
                t: "SOVEREIGN NODE "+i, 
                d: "ระบบสนับสนุนข้อมูลและธุรกรรมภายใต้การควบคุมของ Aris AI",
                img: `https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=600&sig=${i}`
            };
            
            engine.innerHTML += `
                <div class="node-card">
                    <div class="visual-area">
                        <img src="${data.img}" class="station-img" onerror="this.src='https://via.placeholder.com/600x400/111/D4AF37?text=ETHIC+NODE+${data.id}'">
                        <div class="aris-brain-seal"></div>
                    </div>
                    <div class="info-pane">
                        <div class="st-label">STATION ${data.id}</div>
                        <div class="st-title">${data.t}</div>
                        <div class="st-desc">${data.d}</div>
                    </div>
                    <a href="#" class="enter-btn">ENTER GATEWAY</a>
                </div>
            `;
        }
    </script>

    <footer style="text-align:center; padding: 60px; opacity: 0.3; font-family:'Orbitron'; letter-spacing: 5px;">
        COPYRIGHT &copy; 2026 ETHIC HOLDINGS | INTEGRATED BY ARIS
    </footer>

</body>
</html>
