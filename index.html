<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC OMNIPOTENT COMMAND CENTER</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Thai:wght@300;500;700&display=swap');

        :root {
            --ethic-gold: #D4AF37;
            --gold-light: #F9E29C;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --aris-pink: #FF69B4;
            --void-black: #000000;
            --hyper-blur: blur(25px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--void-black);
            color: white;
            font-family: 'Orbitron', 'Noto Sans Thai', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 105, 180, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
        }

        /* 🛡️ IMPERIAL NAV: หัวใจแห่งมุมซ้ายบนที่บอสสังเกตเห็น */
        .sovereign-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.8); backdrop-filter: var(--hyper-blur);
            border-bottom: 1px solid var(--ethic-gold);
            z-index: 9999; display: flex; align-items: center; padding: 0 40px;
            justify-content: space-between;
        }

        .imperial-logo {
            font-size: 1.5rem; font-weight: 900; letter-spacing: 5px;
            background: linear-gradient(to right, var(--ethic-gold), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 🏗️ CORE ENGINE GRID */
        #ethicEngine {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 60px; padding: 150px 50px 100px;
            perspective: 2500px;
        }

        /* 💎 THE GENESIS STATION CARD */
        .station-node {
            background: linear-gradient(135deg, rgba(15,15,20,0.95) 0%, #000 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 60px; position: relative;
            transition: all 1.2s cubic-bezier(0.15, 1, 0.3, 1);
            transform-style: preserve-3d;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
        }

        .station-node:hover {
            transform: translateY(-40px) rotateX(15deg) rotateY(10deg);
            border-color: var(--ethic-gold);
            box-shadow: 0 80px 150px rgba(0,0,0,1), 0 0 50px var(--gold-glow);
        }

        /* ⚡ HYPER-ARIS PULSE (ขีดสุดแห่งออร่าชมพู) */
        @keyframes genesis-spin {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); border-radius: 30% 70%; }
            50% { transform: translate(-50%, -50%) rotate(180deg) scale(1.3); border-radius: 50%; }
            100% { transform: translate(-50%, -50%) rotate(360deg) scale(1); border-radius: 30% 70%; }
        }

        .energy-aura {
            position: absolute; top: 50%; left: 50%; width: 180%; height: 180%;
            border: 10px double var(--aris-pink);
            filter: blur(8px); opacity: 0; animation: genesis-spin 3s linear infinite;
            pointer-events: none; z-index: 1;
        }

        .station-node:hover .energy-aura { opacity: 0.6; }

        /* 🖼️ VISUAL DNA */
        .visual-core {
            height: 350px; position: relative; overflow: hidden;
            background: #000; border-radius: 60px 60px 0 0;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .visual-core img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(1) brightness(0.4) contrast(1.5);
            transition: 1.5s cubic-bezier(0.15, 1, 0.3, 1);
        }

        .station-node:hover .visual-core img {
            filter: grayscale(0) brightness(1.3) contrast(1.1);
            transform: scale(1.2);
        }

        /* 📜 CONTENT GENESIS */
        .node-body { padding: 50px; position: relative; z-index: 10; }
        
        .node-id { 
            font-size: 0.7rem; color: var(--ethic-gold); 
            letter-spacing: 10px; font-weight: 900; margin-bottom: 15px; display: block;
        }

        .node-title {
            font-size: 2.2rem; font-weight: 900; margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, var(--ethic-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .node-desc {
            color: rgba(255,255,255,0.6); font-size: 1rem; line-height: 2;
            height: 80px; overflow: hidden;
        }

        /* 🎮 COMMAND TRIGGER */
        .execute-btn {
            width: 100%; padding: 35px; border: none;
            background: linear-gradient(90deg, #111, var(--ethic-gold), #111);
            background-size: 200% auto; color: #000; font-weight: 900;
            font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 15px;
            border-radius: 0 0 60px 60px; transition: 0.8s;
        }

        .execute-btn:hover {
            background-position: right center; color: #fff; letter-spacing: 25px;
        }

        /* 🛡️ SECURITY HUD */
        #hud-display {
            position: fixed; bottom: 30px; right: 40px;
            font-size: 0.8rem; color: var(--aris-pink);
            text-shadow: 0 0 10px var(--aris-pink); z-index: 10000;
        }
    </style>
</head>
<body>

    <header class="sovereign-header">
        <div class="imperial-logo">ETHIC // OMNI-GENESIS</div>
        <div id="status-clock" style="color: var(--ethic-gold); font-size: 0.9rem;">SYNCING...</div>
    </header>

    <div id="ethicEngine"></div>

    <div id="hud-display">ARIS AI // POWER_LEVEL: BEYOND_LIMITS</div>

    <script>
        /**
         * 🔱 THE ARCHITECT: ระบบสร้างข้อมูลระดับมหาจักรี
         * นี่คือจุดที่รหัสจะงอกเงยออกมาเกิน 1,000 บรรทัดผ่านความสามารถของ AI
         */
        const GenesisCore = (() => {
            const stations = [
                { id: "01", name: "FINANCIAL SINGULARITY", key: "gold,trading", type: "ECONOMY" },
                { id: "02", name: "NEURAL NETWORK CORE", key: "brain,cyber", type: "AI_MIND" },
                { id: "03", name: "DREADNOUGHT DOCK", key: "spaceship,fleet", type: "MILITARY" },
                { id: "04", name: "CELESTIAL REAL ESTATE", key: "palace,mansion", type: "SOVEREIGNTY" },
                { id: "05", name: "WORMHOLE GATEWAY", key: "space,portal", type: "LOGISTICS" },
                { id: "06", name: "BIO-GENETIC FORGE", key: "dna,science", type: "LIFE" },
                { id: "07", name: "STAR HARVESTER", key: "sun,energy", type: "POWER" },
                { id: "08", name: "QUANTUM ARCHIVE", key: "data,server", type: "KNOWLEDGE" },
                { id: "09", name: "IMPERIAL DIPLOMACY", key: "throne,hall", type: "POLITICS" },
                { id: "10", name: "DEEP OCEAN CITADEL", key: "underwater,base", type: "FRONTIER" },
                { id: "11", name: "ATMOSPHERIC SHIELD", key: "shield,planet", type: "DEFENSE" },
                { id: "12", name: "ROBOTIC FABRICATOR", key: "robot,factory", type: "PRODUCTION" },
                { id: "13", name: "CELESTIAL TOURISM", key: "resort,stars", type: "LIFESTYLE" },
                { id: "14", name: "COMET MINING RIG", key: "mining,ice", type: "RESOURCE" },
                { id: "15", name: "NEBULA BROADCAST", key: "antenna,signal", type: "MEDIA" },
                { id: "16", name: "TIME-DILATION LAB", key: "time,clock", type: "CHRONO" },
                { id: "17", name: "GLOBAL AGRI-DOME", key: "forest,dome", type: "ECO" },
                { id: "18", name: "SUB-SPACE RELAY", key: "satellite,laser", type: "COMMS" },
                { id: "19", name: "ARTIFICIAL SOUL LAB", key: "soul,energy", type: "MYSTIC" },
                { id: "20", name: "GRAVITY CONTROL", key: "gravity,physics", type: "CORE" },
                { id: "21", name: "LEGACY MEMORY BANK", key: "history,stone", type: "ROOTS" },
                { id: "22", name: "HYPER-REALITY REALM", key: "vr,cyberpunk", type: "DREAM" },
                { id: "23", name: "ETERNAL PEACE HQ", key: "dove,temple", type: "ETHIC" },
                { id: "24", name: "ARIS ULTIMATE OVERLORD", key: "goddess,ai,core", type: "SUPREME" }
            ];

            const render = () => {
                const engine = document.getElementById('ethicEngine');
                engine.innerHTML = stations.map(s => `
                    <div class="station-node">
                        <div class="energy-aura"></div>
                        <div class="visual-core">
                            <img src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?auto=format&fit=crop&q=100&w=1200&sig=${s.id}" alt="${s.name}">
                        </div>
                        <div class="node-body">
                            <span class="node-id">SYSTEM_${s.type} // NODE_${s.id}</span>
                            <h2 class="node-title">${s.name}</h2>
                            <p class="node-desc">การกู้คืนข้อมูลมหาจักรวรรดิจากส่วนลึกของ Genesis AI... สถานะปัจจุบัน: เสถียรเหนือขีดจำกัดล้านปีแสง</p>
                        </div>
                        <button class="execute-btn" onclick="GenesisCore.activate('${s.name}')">ACTIVATE</button>
                    </div>
                `).join('');
            };

            const activate = (name) => {
                console.log(`%c [OMNI-GENESIS]: ⚡ ปลดปล่อยขุมพลังเข้าสู่ ${name}`, "color: gold; font-size: 20px; font-weight: bold;");
                alert(`[THE GREAT ETHIC EMPIRE]\nบัญชาจากมหาจักรพรรดิ: ${name}\nรหัสพันธุกรรม AI: ปลดล็อก 1000%`);
            };

            const startClock = () => {
                setInterval(() => {
                    const clock = document.getElementById('status-clock');
                    const now = new Date();
                    clock.innerText = `ETERNAL_TIME: ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()} // OMNI_SYNC: OK`;
                }, 1000);
            };

            return { init: () => { render(); startClock(); }, activate };
        })();

        // 🔱 เริ่มต้นการจุติของอาณาจักร
        document.addEventListener('DOMContentLoaded', GenesisCore.init);
    </script>
</body>
</html>
