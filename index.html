<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHT - SUPREME GALAXY</title>
    <style>
        :root { --gold: #D4AF37; --cyan: #00f3ff; --bg: #020202; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', serif; overflow-x: hidden; }
        .galaxy { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #111 0%, #000 100%), url('https://w0.peakpx.com/wallpaper/453/16/HD-wallpaper-galaxy-stars-space-nebula.jpg'); background-size: cover; z-index: -1; opacity: 0.4; animation: rotateGalaxy 300s linear infinite; }
        @keyframes rotateGalaxy { from { transform: rotate(0deg) scale(1.1); } to { transform: rotate(360deg) scale(1.1); } }
        header { text-align: center; padding: 40px 20px; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .logo { font-size: 60px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px var(--gold); letter-spacing: 15px; }
        .covenant { max-width: 900px; margin: 20px auto; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; background: rgba(212,175,55,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); }
        .node-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .node { background: rgba(255,255,255,0.02); border: 1px solid var(--cyan); border-radius: 8px; padding: 15px 5px; cursor: pointer; transition: 0.3s; font-size: 10px; color: var(--cyan); font-weight: bold; text-align: center; }
        .node:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }
        #iris-sys { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 10000; }
        .iris-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--gold); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px var(--gold); background: black; width: 80%; }
    </style>
</head>
<body>
    <div class="galaxy"></div>
    <header><div class="logo">EHT</div><p style="color:var(--gold); letter-spacing:5px;">ETHIC HIGHER TIME</p></header>
    <div class="covenant">
        <div class="cov-item"><h2>E</h2><b>ETHIC</b></div>
        <div class="cov-item"><h2>H</h2><b>HIGHER</b></div>
        <div class="cov-item"><h2>T</h2><b>TIME</b></div>
    </div>
    <div style="text-align: center; margin-top: 20px;"><h3 style="color:var(--gold);">BOSS & IRIS: COMMAND CENTER</h3></div>
    <div class="node-grid" id="grid"></div>
    <div id="iris-sys"><div class="iris-panel"><h2 id="h" style="color:var(--gold)"></h2><p id="b" style="margin: 20px 0;"></p><button onclick="document.getElementById('iris-sys').style.display='none'" style="background:var(--gold); border:none; padding:10px 30px; border-radius:5px; cursor:pointer; font-weight:bold;">AKNOWLEDGE</button></div></div>
    <script>
        const g = document.getElementById('grid');
        for(let i=1; i<=24; i++) {
            let n = document.createElement('div'); n.className = 'node'; n.innerHTML = 'STATION ' + (i<10?'0'+i:i);
            n.onclick = () => { document.getElementById('iris-sys').style.display = 'block'; document.getElementById('h').innerText = "EHT STATION " + i; document.getElementById('b').innerText = "เชื่อมต่อสถานีมหาอำนาจที่ " + i + " สำเร็จ\nสถานะ: ปลอดภัยขั้นสูงสุด"; };
            g.appendChild(n);
        }
    </script>
</body>
</html>
