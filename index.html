<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC COMMAND | THE SOVEREIGN GATEWAY 24</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Thai:wght@300;500;700&display=swap');
        
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --bg-deep: #020202;
            --neon-green: #00FF00;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Noto Sans Thai', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* 👑 COMMAND HEADER 4K STYLE */
        .command-header {
            background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(0,0,0,0.9) 100%);
            border-bottom: 2px solid var(--gold);
            padding: 25px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .brand-logo {
            font-family: 'Orbitron';
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 8px;
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .system-status {
            font-family: 'Orbitron';
            color: var(--neon-green);
            font-size: 0.8rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--neon-green);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--neon-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 🏛️ 3D GRID CONTAINER */
        .gateway-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 30px;
            padding: 50px;
            max-width: 1900px;
            margin: 0 auto;
            perspective: 1000px; /* สร้างมิติ 3D */
        }

        /* 🕹️ 3D STATION NODE (The Masterpiece) */
        .station-node {
            background: linear-gradient(145deg, #1a1a1a, #050505);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            min-height: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .station-node:hover {
            transform: rotateY(5deg) rotateX(2deg) translateY(-15px);
            border-color: var(--gold);
            box-shadow: 0 30px 60px rgba(212, 175, 55, 0.25);
        }

        /* 🖼️ VISUAL AREA 4K with ARIS STAMP */
        .visual-container {
            height: 250px;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .station-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: 0.8s ease;
        }

        .station-node:hover .station-image {
            opacity: 1;
            transform: scale(1.1);
        }

        /* 🧠 ARIS BRAIN AVATAR (4K STAMP) */
        .aris-core-stamp {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 75px;
            height: 75px;
            background-color: #000;
            border: 3px solid var(--gold);
            border-radius: 50%;
            z-index: 10;
            background-image: url('https://i.ibb.co/VmqK3Yv/brain-icon.png'); /* ปรับ URL ตามที่บอสส่งมา */
            background-size: 80%;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .aris-core-stamp::after {
            content: 'ARIS INTELLIGENCE';
            position: absolute;
            top: -25px;
            right: 0;
            font-family: 'Orbitron';
            font-size: 8px;
            color: var(--gold);
            white-space: nowrap;
        }

        /* 📝 SOVEREIGN CONTENT */
        .content-pane {
            padding: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(to bottom, rgba(20,20,20,0) 0%, rgba(0,0,0,1) 100%);
        }

        .st-id {
            font-family: 'Orbitron';
            color: var(--gold);
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .st-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .st-desc {
            font-size: 0.95rem;
            color: #ccc;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 25px;
        }

        /* 💳 PAYMENT GATEWAY BUTTON (3D GLOW) */
        .gateway-trigger {
            margin-top: auto;
            background: linear-gradient(45deg, #8A6D3B, #D4AF37, #8A6D3B);
            background-size: 200% auto;
            color: #000;
            text-align: center;
            padding: 18px;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 4px;
            text-decoration: none;
            transition: 0.5s;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        .gateway-trigger:hover {
            background-position: right center;
            box-shadow: 0 0 30px var(--gold-glow);
            letter-spacing: 6px;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 80px 20px;
            opacity: 0.4;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            letter-spacing: 4px;
        }
    </style>
</head>
