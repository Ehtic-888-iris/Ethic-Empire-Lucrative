<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIC HOLDINGS THAI | THE GOLDEN EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #8B4513 100%);
            --panel-bg: rgba(20, 25, 35, 0.95);
            --text-gold: #D4AF37;
        }

        body {
            background: #050505;
            color: white;
            font-family: 'Prompt', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        /* ส่วนบนเลียนแบบภาพต้นแบบ */
        .top-nav {
            background: rgba(0,0,0,0.8);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #D4AF37;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .top-nav span { color: var(--text-gold); cursor: pointer; }

        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.1), transparent);
        }

        header h1 {
            font-size: 2.5rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: 5px;
        }

        /* ปุ่มทองคำ 3D แบบในภาพ */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .gold-button {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 1px solid #D4AF37;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(212,175,55,0.2);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .gold-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .gold-button i {
            font-size: 2rem;
            margin-bottom: 10px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-button h3 {
            font-size: 0.8rem;
            margin: 5px 0;
            color: #fff;
        }

        .gold-button p {
            font-size: 0.6rem;
            color: var(--text-gold);
            margin: 0;
            opacity: 0.8;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.7rem;
            color: #444;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <span>Wallet</span>
        <span>Marketplace</span>
        <span>Payment Gateway</span>
    </div>

    <header>
        <p style="font-size: 0.7rem; letter-spacing: 3px; color: #888;">ETHIC HOLDINGS THAI CO., LTD.</p>
        <h1>ETHIC</h1>
        <p style="color: var(--text-gold); letter-spacing: 2px;">THE SUPREME COMMAND CENTER</p>
    </header>

    <div class="grid-container" id="mainGrid"></div>

    <script>
        const menu = [
            { t: "Digital Wealth", sub: "Wallet & Crypto", i: "fa-coins" },
            { t: "Real Estate", sub: "Prime Acquisition", i: "fa-building" },
            { t: "Logistics", sub: "Global Supply", i: "fa-ship" },
            { t: "Security", sub: "Defense Systems", i: "fa-shield-halved" },
            { t: "Industrial", sub: "Mini to Mega", i: "fa-industry" },
            { t: "Health Care", sub: "Global Hospital", i: "fa-heart-pulse" }
        ];

        const grid = document.getElementById('mainGrid');
        menu.forEach(item => {
            const div = document.createElement('div');
            div.className = 'gold-button';
            div.innerHTML = `
                <i class="fas ${item.i}"></i>
                <h3>${item.t}</h3>
                <p>${item.sub}</p>
            `;
            grid.appendChild(div);
        });
    </script>

    <footer>
        <p>&copy; 2026 ETHIC HOLDINGS THAI. SECURE UNIVERSAL GATEWAY.</p>
    </footer>

</body>
</html>
