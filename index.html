<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHT - SUPREME COMMAND CENTER</title>
    <style>
        :root { --gold: #D4AF37; --cyan: #00f3ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* พื้นหลังดวงดาวมหาอำนาจ */
        .universe { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: -1; }
        
        header { text-align: center; padding: 40px 20px; border-bottom: 2px solid var(--gold); background: linear-gradient(to bottom, rgba(212,175,55,0.1), transparent); }
        .logo { font-size: 60px; font-weight: 900; color: var(--gold); text-shadow: 0 0 30px var(--gold); letter-spacing: 10px; margin: 0; }
        
        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px; height: 70vh; overflow-y: auto; }
        
        /* กระเป๋าเงินควอนตัม */
        .wallet-hub { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .wallet-card { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 20px; text-align: center; backdrop-filter: blur(10px); }
        .wallet-card strong { display: block; font-size: 20px; color: var(--gold); margin-top: 8px; }

        /* 24 สถานีสั่งการ */
        .node-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .node-btn { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 15px 5px; border-radius: 8px; font-size: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .node-btn:active { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }

        /* ระบบแจ้งเตือน Security */
        #alertBox { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 2px solid var(--gold); padding: 40px; border-radius: 20px; text-align: center; z-index: 1000; box-shadow: 0 0 50px rgba(212,175,55,0.5); }
    </style>
</head>
<body>
    <div class="universe"></div>
    <header>
        <h1 class="logo">EHT</h1>
        <p style="letter-spacing: 3px; font-size: 14px; color: #aaa;">ETHIC HOLDINGS THAI</p>
        <div id="time" style="color: var(--gold); font-family: monospace; font-size: 12px; margin-top: 10px;">SYSTEM LOADING...</div>
    </header>

    <div class="main-container">
        <div class="wallet-hub">
            <div class="wallet-card">TOTAL ASSETS<strong>฿ 3,500,000,000</strong></div>
            <div class="wallet-card">SYSTEM STATUS<strong style="color: #0f0;">ACTIVE</strong></div>
        </div>

        <h3 style="text-align: center; color: var(--cyan); letter-spacing: 2px;">24 COMMAND NODES</h3>
        <div class="node-grid" id="nodeGrid"></div>
    </div>

    <div id="alertBox">
        <h2 style="color: var(--gold)">COMMAND EXECUTED</h2>
        <p id="alertMsg"></p>
        <button onclick="closeAlert()" style="background:var(--gold); border:none; padding:10px 30px; border-radius:5px; cursor:pointer; font-weight:bold;">AKNOWLEDGE</button>
    </div>

    <script>
        // ระบบเวลา Real-time
        setInterval(() => { document.getElementById('time').innerHTML = new Date().toLocaleString('th-TH'); }, 1000);

        // สร้าง 24 สถานี
        const grid = document.getElementById('nodeGrid');
        for(let i=1; i<=24; i++) {
            let btn = document.createElement('button');
            btn.className = 'node-btn';
            btn.innerHTML = 'NODE ' + (i<10?'0'+i:i);
            btn.onclick = () => {
                document.getElementById('alertBox').style.display = 'block';
                document.getElementById('alertMsg').innerHTML = "เชื่อมต่อสถานีเครือข่ายที่ " + i + " เรียบร้อยแล้ว<br>ระดับความปลอดภัย: ขั้นสูงสุด";
            };
            grid.appendChild(btn);
        }

        function closeAlert() { document.getElementById('alertBox').style.display = 'none'; }
    </script>
</body>
</html>
