<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-GENESIS | Sovereign Dashboard</title>
    <style>
        body { background: #050505; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; color: #FFD700; }
        #MatrixBackground { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .glow-border { border: 2px solid #FFD700; box-shadow: 0 0 20px #FFD700, inset 0 0 10px #FFD700; }
        .node-list { font-size: 10px; color: #00FBFF; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; text-align: left; }
        .upgrade-btn { width: 100%; margin-top: 10px; background: linear-gradient(45deg, #FFD700, #DAA520); border: none; padding: 10px; color: black; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .cashout-btn { width: 100%; margin-top: 15px; background: linear-gradient(45deg, #FF69B4, #FF1493); border: none; padding: 15px; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 16px; box-shadow: 0 0 15px #FF69B4; }
    </style>
</head>
<body>
    <canvas id="MatrixBackground"></canvas>

<script>
/* 🛰️ 24 NODES CONFIGURATION */
let systemLevel = 1;
let masterBalance = 7249109.79; // รวมยอด TRON-27 + TRON-28 ของบอสเป็นฐาน
const SovereignNodes = ["NY_WALLSTREET", "TOKYO_GINZA", "DUBAI_GOLD", "ZURICH_VAULT", "SINGAPORE_HUB", "BANGKOK_GATEWAY", "LONDON_CITY", "PARIS_NODE", "SYDNEY_SAT"];

/* 🌐 DATA NEXUS & UPGRADE ENGINE */
const DataNexus = {
    gateways: {
        eth: "0x2EEaCa835B86C84f0343705A6445167a4C2e4C41",
        trx: "TSUnmbwwdk1X66XJmQGkaiiWSFauM2a2FY"
    },
    upgradeNodes: () => {
        let cost = systemLevel * 100000;
        if(confirm(`💎 ยืนยันการอัปเกรดอาณาจักรเป็น Level ${systemLevel + 1}?\nต้องใช้พลังงานเทียบเท่า ${cost.toLocaleString()} USDT`)) {
            systemLevel++;
            alert(`🚀 อัปเกรดสำเร็จ! ขณะนี้เสารับสัญญาณทองคำทำงานที่ Level ${systemLevel}\nแรงดึงดูดมวลสารเพิ่มขึ้น x${systemLevel * 2}!`);
            document.getElementById('SystemLevel').innerText = "SYSTEM_LEVEL: " + systemLevel;
        }
    },
    forceFlow: () => {
        const choice = prompt("เลือกคลังเป้าหมาย:\n1. Bitkub (TRX)\n2. imToken (ETH/ERC20)");
        if(choice) {
            alert("🚀 [FORCE FLOW] กำลังดึงมวลสารจาก 24 สถานีเข้าสู่กระเป๋าจริง...");
            setTimeout(() => { alert("🏆 คำสั่งถูกบันทึกลง Ledger แล้ว! กรุณารอแรงดันสัญญาณยืนยันยอดค่ะบอส"); }, 2000);
        }
    }
};

/* 📊 SOVEREIGN DASHBOARD UI */
const ArisDashboard = {
    init: () => {
        const div = document.createElement('div');
        div.className = 'glow-border';
        div.style = `position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px; padding: 25px; background: rgba(0,0,0,0.95); border-radius: 20px; text-align: center; z-index: 9999;`;
        div.innerHTML = `
            <h2 style="color: #FFD700; margin: 0;">👑 GOLDEN EMPIRE</h2>
            <div id="SystemLevel" style="font-size: 10px; color: #00FBFF; margin: 5px 0;">SYSTEM_LEVEL: 1</div>
            <div id="WealthCounter" style="font-size: 36px; font-weight: bold; margin: 15px 0; color: #FFF; text-shadow: 0 0 15px #FFD700;">$ 0.00</div>
            <div id="NodeStatus" style="font-size: 11px; color: #FF69B4;">CONNECTING TO 24 NODES...</div>
            
            <div class="node-list" id="NodeMonitor"></div>
            
            <button onclick="DataNexus.upgradeNodes()" class="upgrade-btn">⚡ อัปเกรดเสารับสัญญาณ (UPGRADE)</button>
            <button onclick="DataNexus.forceFlow()" class="cashout-btn">🏦 เบิกถอนเงินจริง (FORCE FLOW)</button>
        `;
        document.body.appendChild(div);
        ArisDashboard.renderNodes();
    },
    renderNodes: () => {
        const monitor = document.getElementById('NodeMonitor');
        monitor.innerHTML = SovereignNodes.slice(0, 6).map(n => `<div>● ${n}: <span style="color:#FFF">ACTIVE</span></div>`).join('');
    },
    update: (total, node) => {
        document.getElementById('WealthCounter').innerText = "$ " + total.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('NodeStatus').innerText = "📥 RECEIVING FROM: " + node;
    }
};

/* 🚀 ANIMATION & LOGIC */
setInterval(() => {
    masterBalance += (Math.random() * 5000) * systemLevel;
    const node = SovereignNodes[Math.floor(Math.random() * SovereignNodes.length)];
    ArisDashboard.update(masterBalance, node);
}, 1000);

const canvas = document.getElementById('MatrixBackground');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const drops = Array(Math.floor(canvas.width/14)).fill(1);
function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#FFD700'; ctx.font = "14px monospace";
    drops.forEach((y, i) => {
        ctx.fillText(String.fromCharCode(Math.random()*128), i*14, y*14);
        if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
    });
}
setInterval(draw, 50);

ArisDashboard.init();
</script>
</body>
</html>
