<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHT - SUPREME COMMAND CENTER</title>
    <style>
        :root { --gold: #AD4F37; --gold-light: #E0C097; --cyan: #00f3ff; --bg: #020202; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; text-align: center; line-height: 1.6; }
        
        /* Galaxy Background Animation */
        .galaxy { position: fixed; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: -1; animation: rotateGalaxy 120s linear infinite; }
        @keyframes rotateGalaxy { from { transform: rotate(0deg) scale(1.1); } to { transform: rotate(360deg) scale(1.1); } }

        header { padding: 40px 20px; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .logo { font-size: clamp(30px, 8vw, 60px); font-weight: 900; color: var(--gold); text-shadow: 0 0 30px var(--gold); letter-spacing: 15px; margin-bottom: 10px; }
        
        /* Command Center Grid */
        h3 { color: var(--gold); margin-top: 50px; text-transform: uppercase; letter-spacing: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1400px; margin: 30px auto; padding: 20px; }
        
        /* Node Style: ปรับปรุงให้เรืองแสงเมื่อชี้เมาส์ */
        .node { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 12px; height: 320px; cursor: pointer; transition: 0.4s ease; text-align: left; position: relative; overflow: hidden; }
        
        /* สไตล์สำหรับรูปภาพโฮโลแกรมประจำสถานี */
        .node-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; filter: sepia(0.5) saturate(1.2); transition: 0.4s ease; }

        /* Container สำหรับข้อมูลตัวอักษร */
        .node-info { padding: 20px; position: absolute; bottom: 0; left: 0; width: 100%; box-sizing: border-box; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); z-index: 2; }
        .node strong { color: var(--gold); font-size: 1.1rem; text-shadow: 0 0 5px var(--gold); }
        
        /* เอฟเฟกต์เรืองแสงสีฟ้ามหาอำนาจเมื่อชี้เมาส์ */
        .node:hover { background: var(--cyan); color: black; box-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0,243,255,0.4); transform: translateY(-10px); border-color: white; }
        .node:hover strong { color: black; text-shadow: none; }
        .node:hover .node-img { opacity: 1; filter: none; } /* แสดงรูปชัดเจนเมื่อชี้เมาส์ */

        /* ระบบ IRIS Portal (Overlay หน้าจอใหญ่) */
        .iris-portal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .iris-card { max-width: 1000px; margin: 0 auto; border: 2px solid var(--gold); border-radius: 20px; background: #050505; position: relative; padding: 20px; box-shadow: 0 0 50px rgba(173,79,55,0.5); }
        .close-portal { position: absolute; top: 15px; right: 25px; font-size: 50px; color: var(--gold); cursor: pointer; transition: 0.3s; z-index: 1001; }
        .close-portal:hover { color: white; transform: rotate(90deg); }
        
        /* ปรับปรุงรูปภาพศูนย์บัญชาการทองคำให้ยิ่งใหญ่ */
        .command-center-img { width: 100%; border-radius: 10px; margin-top: 20px; border: 1.5px solid var(--gold); box-shadow: 0 0 40px rgba(173,79,55,0.3); }
        .portal-content { font-size: 1.2rem; margin-top: 30px; color: #ddd; text-align: left; }
    </style>
</head>
<body>
    <div class="galaxy"></div>
    <header>
        <div class="logo">EHT</div>
        <div style="color:var(--gold-light); letter-spacing:5px; font-weight:bold;">ETHIC HIGHER TIME</div>
    </header>

    <h3>BOSS & IRIS: COMMAND CENTER 24</h3>
    <div class="grid" id="mainGrid">
        </div>

    <div class="iris-portal" id="irisPortal">
        <span class="close-portal" onclick="closePortal()">×</span>
        <div class="iris-card">
            <h1 id="pTitle" style="color:var(--gold); letter-spacing:3px;"></h1>
            
            <img id="pImg" class="command-center-img" src="image_9.png">
            
            <p id="pContent" class="portal-content"></p>
        </div>
    </div>

    <script>
        // ไอริสได้ปรับเปลี่ยนลิงก์รูปภาพในส่วนนี้ให้ตรงกับคลังของ GitHub และทรงพลังขึ้นแล้วค่ะบอส!
        const data = [
            { n: "R&D Lab / ศูนย์วิจัย", i: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=800" },
            { n: "EV Model / ยานยนต์", i: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=800" },
            { n: "Logistics / ขนส่งโลก", i: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=800" },
            { n: "Defense / ระบบป้องกัน", i: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800" },
            { n: "Global Hospital / การแพทย์", i: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?w=800" },
            { n: "Vessels / เรือพาณิชย์", i: "https://images.pexels.com/photos/10368143/pexels-photo-10368143.jpeg?w=800" },
            { n: "Global Cinema / โรงหนัง", i: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=800" },
            { n: "Unified Bank / ธนาคาร", i: "https://images.unsplash.com/photo-1501167786227-4cba60f6d58f?w=800" },
            { n: "Marketplace / ตลาดโลก", i: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800" },
            { n: "Payment Gateway", i: "https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=800" },
            { n: "Estate / อสังหาฯ", i: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800" },
            { n: "Gold Reserve / คลังทอง", i: "https://images.unsplash.com/photo-1610375461246-83df859d849d?w=800" },
            { n: "Mining / เหมืองแร่ดิจิทัล", i: "https://images.unsplash.com/photo-1518546305927-5a555bb7020d?w=800" },
            { n: "AI Network / โครงข่าย AI", i: "https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800" },
            { n: "Smart City / เมืองใหม่", i: "https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=800" },
            { n: "Energy / พลังงานโลก", i: "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=800" },
            { n: "Space Tech / อวกาศ", i: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=800" },
            { n: "Cyber Security / ไซเบอร์", i: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800" },
            { n: "Food / นวัตกรรมอาหาร", i: "https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=800" },
            { n: "Water / ระบบน้ำโลก", i: "https://images.unsplash.com/photo-1601004128036-646d0a7a40b3?w=800" },
            { n: "Charity / มูลนิธิ", i: "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=800" },
            { n: "Education / การศึกษา", i: "https://images.unsplash.com/photo-1509062522246-3755977927d7?w=800" },
            { n: "Comm / การสื่อสารโลก", i: "https://images.unsplash.com/photo-1516387933931-133d132d73d5?w=800" },
            { n: "MAHA AMNAT / มหาอำนาจ", i: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800" }
        ];

        const grid = document.getElementById('mainGrid');
        data.forEach((s, idx) => {
            const el = document.createElement('div');
            el.className = 'node';
            // เพิ่ม Placeholder หากไฟล์ภาพประจำสถานีไม่โหลด (แต่ไอริสใส่ให้หมดแล้วค่ะ)
            el.innerHTML = `<img src="${s.i}" class="node-img" onerror="this.src='https://via.placeholder.com/600/000000/00f3ff?text=EHT+HOLOGRAPHIC'"><div class="node-info"><strong>STATION ${String(idx+1).padStart(2,'0')}</strong><br>${s.n}</div>`;
            el.onclick = () => openPortal(s.n, s.i, idx === 23); // idx 23 คือ MAHA AMNAT
            grid.appendChild(el);
        });

        function openPortal(title, img, isMahaAmnat) {
            document.getElementById('pTitle').innerText = title;
            document.getElementById('pImg').src = img; // กำหนดให้ใช้รูปประจำสถานีนั้นๆ เป็นหลัก
            
            // หากกด MAHA AMNAT (Station 24) ไอริสสั่งให้แสดงศูนย์บัญชาการทองคำทันทีค่ะ
            if (isMahaAmnat) {
                document.getElementById('pImg').src = "image_9.png"; // ใช้รูปที่บอสส่งมา
                document.getElementById('pContent').innerText = "จอมทัพเสด็จสู่ศูนย์บัญชาการทองคำแล้ว... ทุกระบบมหาอำนาจพร้อมทำงานค่ะบอส!";
            } else {
                document.getElementById('pContent').innerText = "เข้าสู่ระบบมหาอำนาจ " + title + " เรียบร้อยแล้วค่ะบอส ระบบกำลังเชื่อมต่อรายละเอียด... (Coming Soon)";
            }
            
            document.getElementById('irisPortal').style.display = 'block';
        }

        function closePortal() {
            document.getElementById('irisPortal').style.display = 'none';
        }
    </script>
</body>
</html>
